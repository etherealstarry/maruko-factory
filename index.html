<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>丸子梦工厂</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    background:#2b1b3d;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:12px;
    -webkit-tap-highlight-color:transparent;user-select:none;
  }
  .game{
    width:100%;max-width:420px;
    background:linear-gradient(180deg,#faf5f0 0%,#f5efe8 100%);
    border-radius:28px;overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.35);position:relative;
  }

  /* topbar */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 20px;background:linear-gradient(180deg,rgba(0,0,0,.03),transparent);
  }
  .topbar .week{font-size:12px;font-weight:700;color:#8b7e9a;}
  .topbar .gold{display:flex;align-items:center;gap:5px;font-size:16px;font-weight:900;color:#c4923a;}
  .topbar .gold .coin{font-size:20px;}

  /* room */
  .room{position:relative;height:220px;background:linear-gradient(180deg,#e8e0f0 0%,#f0ece6 40%,#ede4d5 100%);overflow:hidden;}
  .room-wall{position:absolute;top:0;left:0;right:0;height:65%;background:linear-gradient(180deg,#f5f0e8,#ede6da);}
  .room-floor{position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(180deg,#d4c5ab,#c4b595);}
  .window{position:absolute;top:20px;left:22px;width:64px;height:76px;background:linear-gradient(180deg,#c9e4f7,#a8d4f0);border-radius:8px;border:4px solid #e8dfd0;box-shadow:inset 0 0 20px rgba(255,255,255,.4);}
  .bookshelf{position:absolute;top:24px;right:20px;width:50px;height:64px;background:#d4c5b5;border-radius:4px 4px 0 0;display:flex;flex-direction:column;gap:2px;padding:4px;box-shadow:0 2px 6px rgba(0,0,0,.1);}
  .bookshelf span{display:block;height:8px;border-radius:1px;}
  .desk{position:absolute;bottom:18px;right:24px;width:72px;height:34px;background:#c4a882;border-radius:4px;box-shadow:0 2px 4px rgba(0,0,0,.1);}

  .character{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
  .character:active{transform:translateX(-50%) scale(.9);}
  .char-body{
    width:72px;height:90px;border-radius:40px 40px 24px 24px;
    display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;
    animation:charFloat 3s ease-in-out infinite;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
    background:var(--skin,#fde4cf);
  }
  .char-outfit{position:absolute;bottom:0;left:0;right:0;height:50%;border-radius:0 0 24px 24px;pointer-events:none;transition:background .4s;}
  .char-eyes{position:absolute;top:28px;left:50%;transform:translateX(-50%);display:flex;gap:14px;pointer-events:none;z-index:2;}
  .char-eyes .eye{width:7px;height:8px;background:#4a3525;border-radius:50%;animation:blink 4s ease-in-out infinite;}
  .char-mouth{position:absolute;top:40px;left:50%;transform:translateX(-50%);width:10px;height:5px;border-bottom:2px solid #d4957a;border-radius:0 0 6px 6px;pointer-events:none;z-index:2;}
  @keyframes blink{0%,95%,100%{transform:scaleY(1);}97%{transform:scaleY(.1);}}
  .char-hat{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:22px;pointer-events:none;transition:all .4s;}
  .char-glasses{position:absolute;top:21px;left:50%;transform:translateX(-50%);font-size:18px;pointer-events:none;transition:all .4s;letter-spacing:8px;z-index:3;line-height:1;}
  @keyframes charFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

  .char-expression{
    font-size:13px;position:absolute;top:-8px;
    background:white;padding:3px 8px;border-radius:10px;white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.08);font-weight:700;color:#5a4a3a;
    transform:translateY(-100%);opacity:.9;
  }
  .char-shadow{width:48px;height:8px;background:rgba(0,0,0,.07);border-radius:50%;margin-top:2px;}

  /* stats */
  .stat-panel{padding:14px 20px 10px;display:flex;flex-direction:column;gap:6px;}
  .stat-row{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:#6b5e7a;}
  .stat-row .stat-icon{font-size:16px;width:22px;text-align:center;}
  .stat-row .stat-name{width:36px;flex-shrink:0;}
  .stat-bar-outer{flex:1;height:8px;background:rgba(0,0,0,.06);border-radius:10px;overflow:hidden;}
  .stat-bar-inner{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
  .stat-row .stat-val{width:30px;text-align:right;font-weight:900;color:#4a3d5a;}

  /* tabs */
  .tabbar{display:flex;gap:4px;padding:6px 20px 0;overflow-x:auto;scrollbar-width:none;}
  .tabbar::-webkit-scrollbar{display:none;}
  .tab{
    flex-shrink:0;padding:9px 15px;border:none;border-radius:20px;
    font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
    background:rgba(0,0,0,.04);color:#8b7e9a;transition:all .25s;white-space:nowrap;
  }
  .tab.on{background:linear-gradient(135deg,#9dd9c8,#a8d8ea);color:white;box-shadow:0 3px 12px rgba(157,217,200,.4);}

  /* panels */
  .panel{display:none;padding:10px 20px 20px;}
  .panel.on{display:block;}

  /* category section */
  .cat-title{
    font-size:11px;font-weight:800;color:#9b8eaa;letter-spacing:.5px;
    margin:16px 0 8px;display:flex;align-items:center;gap:6px;
    text-transform:uppercase;
  }
  .cat-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,0,0,.06),transparent);}

  .train-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}

  .train-card{
    background:white;border-radius:14px;padding:11px 10px;
    cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.04);
    transition:all .25s;display:flex;flex-direction:column;gap:4px;
    position:relative;overflow:hidden;border-left:3px solid var(--c,#9dd9c8);
  }
  .train-card:active{transform:scale(.94);transition:transform .1s;}
  .train-card .tc-icon{font-size:24px;}
  .train-card .tc-label{font-size:11.5px;font-weight:700;color:#4a3d5a;line-height:1.3;}
  .train-card .tc-info{font-size:9px;color:#9b8eaa;font-weight:600;display:flex;gap:4px;flex-wrap:wrap;margin-top:auto;}
  .train-card .tc-info span{background:rgba(0,0,0,.04);padding:2px 5px;border-radius:5px;color:#6b5e7a;}
  .train-card.done{opacity:.4;pointer-events:none;}
  .train-card .tc-del{
    position:absolute;top:4px;right:6px;font-size:12px;color:#c4958a;
    cursor:pointer;z-index:2;
  }
  .train-card .tc-actions{
    position:absolute;top:2px;right:4px;display:flex;gap:3px;
    opacity:0;transition:opacity .2s;z-index:2;
  }
  .train-card:hover .tc-actions,.train-card:active .tc-actions{opacity:1;}
  .tc-edit,.tc-hide,.tc-del{
    font-size:11px;cursor:pointer;width:18px;height:18px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;background:rgba(0,0,0,.05);
    color:#8b7e9a;transition:all .2s;
  }
  .tc-edit:hover{background:#9dd9c8;color:#fff;}
  .tc-hide:hover{background:#e8c170;color:#fff;}
  .tc-del:hover{background:#e88d9e;color:#fff;}
  
  .undo-btn{
    cursor:pointer;font-size:10px;color:#c4958a;padding:1px 6px;
    border-radius:8px;background:rgba(0,0,0,.03);transition:all .2s;
    margin-left:6px;opacity:0;
  }
  .log-row:hover .undo-btn,.hist-row:hover .undo-btn{opacity:1;}
  .undo-btn:hover{background:#e88d9e;color:#fff;}

  /* add custom btn */
  .add-custom{
    background:rgba(0,0,0,.03);border:2px dashed rgba(0,0,0,.1);
    border-radius:14px;padding:14px;text-align:center;
    cursor:pointer;font-size:13px;font-weight:700;color:#9b8eaa;
    margin-top:8px;transition:all .2s;
  }
  .add-custom:active{background:rgba(0,0,0,.06);}

  /* custom form */
  .custom-form{
    background:white;border-radius:14px;padding:14px;
    box-shadow:0 2px 10px rgba(0,0,0,.06);margin-top:8px;display:none;
  }
  .custom-form.show{display:block;}
  .custom-form input,.custom-form select{
    width:100%;padding:8px 10px;border:2px solid rgba(0,0,0,.08);
    border-radius:8px;font-family:inherit;font-size:13px;margin-bottom:6px;
    background:#fafafc;
  }
  .custom-form .cf-row{display:flex;gap:6px;}
  .custom-form .cf-row input{flex:1;}
  .custom-form button{
    padding:8px 16px;border:none;border-radius:20px;
    font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;
  }
  .cf-save{background:linear-gradient(135deg,#9dd9c8,#a8d8ea);color:white;}
  .cf-cancel{background:rgba(0,0,0,.05);color:#8b7e9a;}

  /* shop */
  .shop-section{margin-top:8px;}
  .shop-section .ss-title{font-size:11px;font-weight:800;color:#9b8eaa;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
  .shop-item{
    background:white;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.04);margin-bottom:6px;cursor:pointer;transition:all .2s;
  }
  .shop-item:active{transform:scale(.97);}
  .shop-item.locked{opacity:.4;pointer-events:none;}
  .shop-item.owned{opacity:.7;border:2px solid #9dd9c8;}
  .shop-icon{font-size:30px;flex-shrink:0;}
  .shop-body{flex:1;}
  .shop-name{font-size:13px;font-weight:700;color:#4a3d5a;}
  .shop-cost{font-size:10px;color:#9b8eaa;font-weight:600;margin-top:2px;}
  .shop-effect{font-size:10px;color:#9dd9c8;font-weight:600;}
  .buy-btn{
    background:linear-gradient(135deg,#f2c94c,#f7c59f);border:none;border-radius:20px;
    padding:7px 14px;font-family:inherit;font-size:11px;font-weight:800;color:#7a5500;cursor:pointer;flex-shrink:0;
  }
  .buy-btn.owned{background:#e0e0e0;color:#999;}

  /* summary */
  .ending-card{
    background:white;border-radius:14px;padding:20px;text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.04);margin-bottom:10px;line-height:1.8;
  }
  .today-log{
    background:white;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.04);
  }
  .log-title{font-size:12px;font-weight:800;color:#9b8eaa;margin-bottom:8px;}
  .log-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;font-weight:600;border-bottom:1px solid rgba(0,0,0,.03);}
  .log-row:last-child{border:none;}

  /* history */
  .hist-row{
    background:white;border-radius:12px;padding:10px 14px;margin-bottom:6px;
    display:flex;justify-content:space-between;align-items:center;
    box-shadow:0 1px 8px rgba(0,0,0,.03);font-size:12px;font-weight:600;
  }
  .hist-time{font-size:10px;color:#9b8eaa;display:block;}

  /* toast */
  .toast{
    position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);
    background:rgba(45,45,55,.9);color:white;padding:12px 24px;border-radius:30px;
    font-size:13px;font-weight:700;z-index:999;transition:all .4s cubic-bezier(.34,1.56,.64,1);
    opacity:0;pointer-events:none;backdrop-filter:blur(12px);white-space:nowrap;
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  .conf{position:fixed;pointer-events:none;z-index:9999;animation:confFall 1.6s ease-in forwards;font-size:14px;}
  @keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

  .reset-link{display:block;text-align:center;margin-top:14px;font-size:11px;color:#c4958a;cursor:pointer;font-weight:600;padding:8px;}
</style>
</head>
<body>

<div class="game">

  <div class="topbar">
    <span class="week">📅 第 <b id="wN">1</b> 周</span>
    <span class="gold"><span class="coin">🪙</span> <b id="gN">0</b></span>
  </div>

  <div class="room">
    <div class="room-wall"></div><div class="room-floor"></div>
    <div class="window"></div>

    <div class="character" onclick="poke()">

        <span class="char-glasses" id="cGlass"></span>
        <div class="char-eyes"><span class="eye"></span><span class="eye"></span></div>
        <div class="char-mouth"></div>
        <div class="char-outfit" id="cOutfit" style="background:transparent;"></div>
      </div>
      <div class="char-shadow"></div>
    </div>
  </div>

  <div class="stat-panel">
    <div class="stat-row"><span class="stat-icon">📚</span><span class="stat-name">学习</span><div class="stat-bar-outer"><div class="stat-bar-inner" id="bLearn" style="background:#a8d8ea;width:0%"></div></div><span class="stat-val" id="vLearn">0</span></div>
    <div class="stat-row"><span class="stat-icon">💪</span><span class="stat-name">健康</span><div class="stat-bar-outer"><div class="stat-bar-inner" id="bHealth" style="background:#9dd9c8;width:0%"></div></div><span class="stat-val" id="vHealth">0</span></div>
    <div class="stat-row"><span class="stat-icon">⚡</span><span class="stat-name">执行</span><div class="stat-bar-outer"><div class="stat-bar-inner" id="bWill" style="background:#f2c94c;width:0%"></div></div><span class="stat-val" id="vWill">0</span></div>
    <div class="stat-row"><span class="stat-icon">💖</span><span class="stat-name">幸福</span><div class="stat-bar-outer"><div class="stat-bar-inner" id="bHappy" style="background:#f2a7b3;width:0%"></div></div><span class="stat-val" id="vHappy">0</span></div>
  </div>

  <div class="tabbar">
    <button class="tab on" onclick="sw('train')">🎓 训练</button>
    <button class="tab" onclick="sw('shop')">🏪 商店</button>
    <button class="tab" onclick="sw('summary')">📋 今日</button>
    <button class="tab" onclick="sw('history')">📜 足迹</button>
  </div>

  <div class="panel on" id="p-train"><div id="trainArea"></div></div>
  <div class="panel" id="p-shop"><div id="shopArea"></div></div>
  <div class="panel" id="p-summary"><div id="sumArea"></div></div>
  <div class="panel" id="p-history"><div id="histArea"></div></div>
  <div style="display:flex;justify-content:center;gap:12px;margin-top:14px;">
    <span style="font-size:11px;color:#9dd9c8;cursor:pointer;font-weight:600;" onclick="syncNow()">🔄 同步</span>
    <span style="font-size:11px;color:#9b8eaa;cursor:pointer;font-weight:600;" onclick="exportSave()">📤 导出</span>
    <span style="font-size:11px;color:#9b8eaa;cursor:pointer;font-weight:600;" onclick="document.getElementById('importFile').click()">📥 导入</span>
    <span style="font-size:11px;color:#c4958a;cursor:pointer;font-weight:600;" onclick="resetAll()">🔄 重置</span>
    <span style="font-size:11px;color:#8b7e9a;cursor:pointer;font-weight:600;" onclick="showHiddenPanel()">👁 恢复隐藏</span>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importSave(event)">
</div>

<div class="toast" id="toast"></div>

function debounceSync(){clearTimeout(_syncTimer);_syncTimer=setTimeout(syncToServer,800);}
async function syncToServer(){
  S._syncedAt=Date.now();
  const body=JSON.stringify(S);

  try{

      body:JSON.stringify({message:'auto-save',content:btoa(unescape(encodeURIComponent(body))),sha:info.sha,branch:'main'})
    });
  }catch(e){}
}
async function syncFromServer(){
  try{
    const r=await fetch('save.json',{headers:{'Cache-Control':'no-cache'}});
    if(!r.ok) return;
    const cloud=await r.json();
    if(!cloud||!cloud.stats) return;
    const cloudTime=cloud._syncedAt||0;
    const localTime=S._syncedAt||0;
    if(cloudTime>localTime){
      S={...S,...cloud,stats:{...S.stats,...(cloud.stats||{})},equipped:{...(cloud.equipped||{})},_syncedAt:cloudTime};

function buyOutfit(id){

function equip(id){
  const o=OUTFITS.find(x=>x.id===id);if(!o) return;
  S.equipped=S.equipped||{};
  const eqKey=o.eq;
  const eqVal=o.hat||o.glass||o.outfit;

    if(o.glass) S.equipped.glass=o.glass;

// ── UNDO ──
function undoToday(id){
  if(!confirm('撤销这条训练记录？')) return;
  const all=[...CATEGORIES.flatMap(c=>c.actions),...S.custom];
  const a=all.find(x=>x.id===id);if(!a) return;
  const count=S.done[id]||0;
  if(count>0){
    S.done[id]=count-1;
    const edited=S.edited[id];
    const eff=edited||(a.s||{});
    const g=edited&&edited.g!==undefined?edited.g:(a.g||0);
    S.gold-=(g||0);
    Object.entries(eff).forEach(([k,v])=>{S.stats[k]=cl((S.stats[k]||0)-v);});
  }
  // Remove last matching hist entry
  for(let i=(S.hist||[]).length-1;i>=0;i--){
    if(S.hist[i].id===id){S.hist.splice(i,1);break;}
  }
  sv();renderAll();toast('已撤销 ↩');
}

function undoHist(i){
  if(!confirm('撤销这条记录？')) return;
  const all=[...CATEGORIES.flatMap(c=>c.actions),...S.custom];
  const h=(S.hist||[]).reverse()[i];
  if(!h) return;
  
  if(h.id){
    // It's a training action
    const a=all.find(x=>x.id===h.id);
    if(a){
      const count=S.done[h.id]||0;
      if(count>0){
        S.done[h.id]=count-1;
        const edited=S.edited[h.id];
        const eff=edited||(a.s||{});
        Object.entries(eff).forEach(([k,v])=>{S.stats[k]=cl((S.stats[k]||0)-v);});
        S.gold-=(h.gold||0);
      }
    }
  } else {
    // It's a shop purchase - just reverse gold
    S.gold-=(h.gold||0);
  }
  
  // Remove the specific hist entry
  const idx=(S.hist||[]).length-1-i;
  S.hist.splice(idx,1);
  sv();renderAll();toast('已撤销 ↩');
}

// ── TRAIN ──
function now(){return new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}

function train(id){
  const all=[...CATEGORIES.flatMap(c=>c.actions),...S.custom];
  const a=all.find(x=>x.id===id);if(!a) return;
  if(a.single&&(S.done[id]||0)>0) return;
  S.done[id]=(S.done[id]||0)+1;
  const edited=S.edited[id];
  const eff=edited||(a.s||{});
  const g=edited&&edited.g!==undefined?edited.g:(a.g||0);
  S.gold+=g;
  Object.entries(eff).forEach(([k,v])=>{S.stats[k]=cl((S.stats[k]||0)+v);});
  S.hist.push({id:id,icon:a.icon,label:a.label,good:g>=0,gold:g,time:now(),s:{...eff}});
  sv();toast(a.g<0?`${a.icon} 诚实记录…`:`${a.icon} 训练完成！`);
  if(a.g>=0) confetti();
  renderAll();
}

  const cols=['#9dd9c8','#f2c94c','#f2a7b3','#a8d8ea','#c3b1e1','#f7c59f'];
  const shapes=['●','◆','▲','♥','★'];
  for(let i=0;i<14;i++){const d=document.createElement('div');d.className='conf';d.textContent=shapes[Math.floor(Math.random()*shapes.length)];d.style.cssText=`left:${Math.random()*100}vw;top:-10px;color:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*.4}s;animation-duration:${1.2+Math.random()*1}s;`;document.body.appendChild(d);setTimeout(()=>d.remove(),2500);}
}

const POKES=['丸子頑張って！','今天训练了吗？','摸摸头～','你超棒的！','博士への道！','累了就休息哦','又在偷偷厉害呢','记得喝水💧'];
let pi=0;function poke(){toast(POKES[pi%POKES.length]);pi++;}

function resetAll(){if(!confirm('重新开始？所有数据清空。')) return;localStorage.removeItem('mf2');S=ld();renderAll();toast('新しい旅 🌱');}

function exportSave(){
  const data=JSON.stringify(S,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='maruko_save_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('存档已导出 📤');
}
function importSave(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const data=JSON.parse(reader.result);
      if(!data.stats||!('gold' in data)){toast('文件不对哦 ⚠️');return;}
      if(!confirm('导入存档会覆盖当前数据，确认？')) return;
      S=data;sv();renderAll();toast('存档导入成功！💾');
    }catch{toast('文件损坏了 ⚠️');}
  };
  reader.readAsText(file);e.target.value='';
}
function syncNow(){syncToServer().then(()=>syncFromServer()).then(()=>{renderAll();toast('☁️ 同步完成');}).catch(()=>toast('网络不太好，稍后重试 ⚠️'));}
function renderAll(){renderStats();renderChar();renderTraining();renderShop();renderSummary();renderHistory();}
dc();renderAll();syncFromServer().then(()=>renderAll());
</script>
